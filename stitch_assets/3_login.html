<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Comailer - Sign In</title>

                    "surface": "#faf6f0",

                    "primary-fixed-dim": "#8ecf9e",

            "fontFamily": {
                    "headline": ["Literata", "serif"],
                    "display": ["Literata", "serif"],
                    "body": ["Nunito Sans", "sans-serif"],

<style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        @keyframes blob-shift {
            0% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
            33% { border-radius: 73% 27% 23% 77% / 55% 33% 67% 45%; }
            66% { border-radius: 37% 63% 51% 49% / 30% 73% 27% 70%; }
            100% { border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%; }
        }

        .animate-float {
            animation: float 10s ease-in-out infinite;
        }

        .animate-blob {
            animation: blob-shift 15s ease-in-out infinite alternate;
        }

        .glass-card {
            background: rgba(250, 246, 240, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(46, 50, 48, 0.06);
        }

        .entrance-fade-up {
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body overflow-hidden selection:bg-primary-fixed selection:text-on-primary-fixed-variant">
<!-- Organic Animated Background -->
<div class="fixed inset-0 -z-10 overflow-hidden bg-background">
<!-- Soft Mesh Gradient Blobs -->
<div class="absolute top-[-10%] left-[-5%] w-[60%] h-[60%] bg-primary/10 blur-[100px] animate-blob"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-tertiary/10 blur-[120px] animate-blob" style="animation-delay: -5s;"></div>
<div class="absolute top-[30%] right-[15%] w-[30%] h-[30%] bg-secondary/5 blur-[80px] animate-blob" style="animation-delay: -10s;"></div>
<!-- Floating Textures (Hidden for ultra-clean look, but adding subtle noise) -->
<div class="absolute inset-0 opacity-[0.03]" style="background-image: url('https://www.transparenttextures.com/patterns/felt.png');"></div>
</div>
<!-- Main Content Container -->
<main class="min-h-screen flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-md entrance-fade-up">
<!-- Branding Header -->
<div class="text-center mb-8 space-y-2">
<div class="inline-flex items-center justify-center p-3 bg-primary/10 rounded-xl mb-4">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">alternate_email</span>
</div>
<h1 class="font-headline text-4xl font-bold tracking-tight text-primary">Comailer</h1>
<p class="text-on-surface-variant font-body">Refined communication for the modern web.</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-xl p-8 sm:p-10">
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-transparent rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-surface-bright transition-all text-on-surface placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-semibold text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant group-focus-within:text-primary transition-colors">lock</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-surface-container-low border-transparent rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary focus:bg-surface-bright transition-all text-on-surface placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-on-surface transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-sm" id="pw-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-background bg-surface-container-low" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-3 block text-sm text-on-surface-variant" for="remember-me">
                            Keep me signed in
                        </label>
</div>
<!-- Submit Button -->
<button class="group relative w-full flex justify-center py-4 px-6 border border-transparent text-sm font-bold rounded-lg text-on-primary bg-primary hover:bg-primary/90 focus:outline-none focus:ring-4 focus:ring-primary/30 transition-all active:scale-[0.98]" type="submit">
<span class="flex items-center gap-2">
                            Sign In
                            <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
</span>
</button>
</form>
<!-- Social Login Separator -->
<div class="mt-8">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-4 bg-transparent text-on-surface-variant text-xs font-semibold tracking-wider uppercase">Or continue with</span>
</div>
</div>
<div class="mt-6 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-surface-container-high hover:bg-surface-variant text-on-surface transition-colors border border-outline-variant/20">
<img alt="Google" class="w-4 h-4 grayscale opacity-70 group-hover:grayscale-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAhiqqLuTEwd1o6LZVsiaFYq-sgWnIzoggg8oLxBtjK4Sl-QnQvd_o_SdB4Y0YX7abf2AW40QwyFkCh55-v81o9wAupxDRxtfysB-EEvxPv66Cav23mXslFU8Ec7UPH4fpwoaT5Pe6O0k81VRBRtBngptNciozB1JwhYUyvKtwSmDWnrqiZDCz78lp9rS0fUaR-y1DltKEBhjnWp2oCtzkjWz_7t7Tfsh4zMqmz3_hIon2orvT8KLi-Re98_63hH42dyWIdXu6AiWc"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-surface-container-high hover:bg-surface-variant text-on-surface transition-colors border border-outline-variant/20">
<span class="material-symbols-outlined text-lg">passkey</span>
<span class="text-sm font-semibold">Passkey</span>
</button>
</div>
</div>
</div>
<!-- Footer Links -->
<p class="mt-8 text-center text-sm text-on-surface-variant">
                New to Comailer? 
                <a class="font-bold text-primary hover:underline underline-offset-4 decoration-2" href="#">Create an account</a>
</p>
<div class="mt-12 flex justify-center gap-6 text-[10px] uppercase tracking-widest font-bold text-on-surface-variant/40">
<a class="hover:text-primary transition-colors" href="#">Security</a>
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">System Status</a>
</div>
</div>
</main>
<script>
        function togglePassword() {
            const pwInput = document.getElementById('password');
            const icon = document.getElementById('pw-toggle-icon');
            if (pwInput.type === 'password') {
                pwInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                pwInput.type = 'password';
                icon.textContent = 'visibility';
            }
        }

        // Add a subtle parallax effect based on mouse movement
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            
            const card = document.querySelector('.glass-card');
            if (card) {
                card.style.transform = `translate(${x}px, ${y}px)`;
            }
        });
    </script>
</body></html>
